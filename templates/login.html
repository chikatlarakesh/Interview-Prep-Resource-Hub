<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep Resource Hub</title>
    <link rel="stylesheet" href="/styles/style.css">
    <style>
        body{
            background-image: url("https://tinyurl.com/7b3pz94y");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="Login Page">
        <h1>Login to your account</h1>
    <br>
    <main>
        <form action="">  
            <label for="email">Email: </label>
            <input type="email" name="email" id="email" placeholder="Enter your email-id" required> <br><br>

            <label for="password">Password: </label>
            <input type="password" name="password" id="password" placeholder="Enter your password" maxlength="14" required> <br><br>
            <button type="submit" class="submit-button">Login</button> <br><br>
            Don't have an account? <button type="button" class="submit-button" title="Create account?" onclick="window.location.href='signup.html'">Signup</button>
        </form>
    </main>
    </div>
</body>
</html>
