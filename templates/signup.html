<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/styles/style.css">
    <style>
        body {
            background-image: url('signup.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;  
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
        }
        
        .signup-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .submit-button {
            background-color: #007bff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .submit-button:hover {
            background-color: #0056b3;
        }

        .signin-text {
            margin-top: 10px;
        }

        .signin-text button {
            background: none;
            border: none;
            color: #007bff;
            cursor: pointer;
            font-size: 14px;
        }

        .signin-text button:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>Create Your Account</h1>
    
        <form id="signup-form">
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" placeholder="Enter your name" required>

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Enter your email-id" required>

            <label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter your password" maxlength="14" required>

            <label for="confirm_password">Confirm Password:</label>
            <input type="password" name="confirm_password" id="confirm_password" placeholder="Re-enter your password" maxlength="14" required>

            <button type="submit" class="submit-button">Sign Up</button>

            <p class="signin-text">Already have an account? 
                <button type="button" onclick="window.location.href='login.html'">Sign In</button>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevents the page from reloading
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // Check if passwords match
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message); // Show success message
                    window.location.href = 'login.html'; // Redirect to login page
                } else {
                    alert(data.error); // Show error message
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong! Please try again.");
            }
        });
    </script>
</body>
</html>
