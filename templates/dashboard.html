<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <header>
        <h1 id="user-welcome">Welcome!</h1>
        <nav>
            <ul>
                <li><input type="text" id="search-input" placeholder="Search resources..." onkeyup="searchResources()"></li>
                <li><a href="#" onclick="editProfile()">Edit Profile</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>    

    <main>
        <section id="profile">
            <h2>Profile Information</h2>
            <p><strong></strong> <span id="user-name">Loading...</span></p>
            <p><strong></strong> <span id="user-email">Loading...</span></p>
            <p><strong></strong> <span id="user-dob">Loading...</span></p>
            <p><strong></strong> <span id="user-mobile">Loading...</span></p>
            <p><strong></strong> <span id="user-pincode">Loading...</span></p>
            <p><strong></strong> <span id="user-subject">Loading...</span></p>
            <p><strong></strong> <span id="user-created">Loading...</span></p>
        </section>
        
        <div id="edit-profile-popup" class="popup" style="display: none;">
            <h2>Edit Profile</h2>
            <input type="text" id="new-name" placeholder="Enter new name">
            <input type="email" id="new-email" placeholder="Enter new email">
            <input type="date" id="new-dob">
            <input type="text" id="new-mobile" placeholder="Enter mobile number">
            <input type="text" id="new-pincode" placeholder="Enter pincode">
            <input type="text" id="new-subject" placeholder="Enter subject interest">
            <button onclick="updateProfile()">Save Changes</button>
            <button onclick="closePopup()">Cancel</button>
        </div>

        <section id="resources">
            <h2>Available Resources</h2>
            <div id="resources-container">
                <p>Loading resources...</p>
            </div>
        </section> 
    </main>

    <script src="../js/dashboard.js" defer></script>
</body>
</html>
